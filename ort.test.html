<!DOCTYPE html>
<html lang="ky">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title></title>
<style>
body {
  font-family: Arial, sans-serif;
  background: #e3f2fd;
  display: flex;
  justify-content: center;
  align-items: center;
  height: 100vh;
  margin: 0;
}
.container {
  background: white;
  padding: 25px 20px;
  border-radius: 15px;
  box-shadow: 0 5px 15px rgba(0,0,0,0.2);
  width: 90%;
  max-width: 400px;
  text-align: center;
}
h1 {
  color: #1565c0;
}
button {
  width: 100%;
  padding: 12px;
  margin: 8px 0;
  border: none;
  border-radius: 8px;
  background-color: #1565c0;
  color: white;
  font-size: 16px;
  cursor: pointer;
}
button:hover {
  background-color: #0d47a1;
}
</style>
</head>
<body>
<div class="container">
  <div id="start">
    <h1>ЖРТ Математика Тест</h1>
    <p>10 суроолук алдын ала тест</p>
    <button onclick="startTest()">Баштоо</button>
  </div>
  <div id="quiz" style="display:none;">
    <h2 id="question"></h2>
    <button onclick="checkAnswer(0)" id="btn0"></button>
    <button onclick="checkAnswer(1)" id="btn1"></button>
    <button onclick="checkAnswer(2)" id="btn2"></button>
  </div>
  <div id="result" style="display:none;">
    <h2 id="score"></h2>
    <button onclick="restart()">Кайра баштоо</button>
  </div>
</div>
<script>
var questions = [
  ["2 + 3 = ?", ["4","5","6"], 1],
  ["7 - 4 = ?", ["2","3","4"], 1],
  ["5 * 2 = ?", ["10","12","8"], 0],
  ["12 / 4 = ?", ["2","3","4"], 1],
  ["9 + 6 = ?", ["14","15","16"], 1],
  ["8 - 3 = ?", ["4","5","6"], 1],
  ["3 * 3 = ?", ["6","9","12"], 1],
  ["16 / 2 = ?", ["6","8","10"], 1],
  ["7 + 5 = ?", ["11","12","13"], 1],
  ["10 - 7 = ?", ["2","3","4"], 1]
];
var current = 0;
var score = 0;
function startTest() {
  document.getElementById("start").style.display = "none";
  document.getElementById("quiz").style.display = "block";
  showQuestion();
}
function showQuestion() {
  document.getElementById("question").innerText = questions[current][0];
  document.getElementById("btn0").innerText = questions[current][1][0];
  document.getElementById("btn1").innerText = questions[current][1][1];
  document.getElementById("btn2").innerText = questions[current][1][2];
}
function checkAnswer(i) {
  if (i === questions[current][2]) {
    score++;
  }
  current++;
  if (current < questions.length) {
    showQuestion();
  } else {
    showResult();
  }
}
function showResult() {
  document.getElementById("quiz").style.display = "none";
  document.getElementById("result").style.display = "block";
  document.getElementById("score").innerText = "Жыйынтык: " + score + " / " + questions.length;
}
function restart() {
  current = 0;
  score = 0;
  document.getElementById("result").style.display = "none";
  document.getElementById("start").style.display = "block";
}
</script>
</body>
</html>
