<!DOCTYPE html>
<html lang="ky">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ЖРТ Тест</title>

<style>
body {
  font-family: Arial, sans-serif;
  text-align: center;
  background: #f0f2f5;
  margin: 0;
  padding: 0;
}

.container {
  max-width: 400px;
  margin: 50px auto;
  background: white;
  padding: 20px;
  border-radius: 15px;
  box-shadow: 0 0 10px rgba(0,0,0,0.1);
}

h1, h2 {
  color: #333;
}

button {
  width: 100%;
  padding: 12px;
  margin: 8px 0;
  border: none;
  border-radius: 8px;
  background: #4CAF50;
  color: white;
  font-size: 16px;
  cursor: pointer;
}

button:hover {
  background: #45a049;
}
</style>

</head>
<body>

<div class="container">

  <!-- Башкы бет -->
  <div id="start">
    <h1>ЖРТ тестине даярдануу</h1>
    <p>Алдын ала сыноо тиркемеси</p>
    <button onclick="startTest()">Баштоо</button>
  </div>

  <!-- Тест -->
  <div id="quiz" style="display:none;">
    <h2 id="question"></h2>
    <div id="answers"></div>
  </div>

  <!-- Жыйынтык -->
  <div id="result" style="display:none;">
    <h2 id="score"></h2>
    <button onclick="restart()">Кайра баштоо</button>
  </div>

</div>

<script>
let questions = [
  {
    question: "2 + 2 = ?",
    answers: ["3", "4", "5"],
    correct: 1
  },
  {
    question: "Кыргызстандын борбору кайсы?",
    answers: ["Ош", "Бишкек", "Нарын"],
    correct: 1
  },
  {
    question: "5 * 3 = ?",
    answers: ["15", "10", "8"],
    correct: 0
  }
];

let current = 0;
let score = 0;

function startTest() {
  document.getElementById("start").style.display = "none";
  document.getElementById("quiz").style.display = "block";
  showQuestion();
}

function showQuestion() {
  let q = questions[current];
  document.getElementById("question").innerText = q.question;

  let answersHTML = "";
  q.answers.forEach((ans, index) => {
    answersHTML += `<button onclick="answer(${index})">${ans}</button>`;
  });

  document.getElementById("answers").innerHTML = answersHTML;
}

function answer(index) {
  if (index === questions[current].correct) {
    score++;
  }

  current++;

  if (current < questions.length) {
    showQuestion();
  } else {
    showResult();
  }
}

function showResult() {
  document.getElementById("quiz").style.display = "none";
  document.getElementById("result").style.display = "block";
  document.getElementById("score").innerText =
    "Сенин жыйынтык: " + score + " / " + questions.length;
}

function restart() {
  current = 0;
  score = 0;
  document.getElementById("result").style.display = "none";
  document.getElementById("start").style.display = "block";
}
</script>

</body>
</html>
