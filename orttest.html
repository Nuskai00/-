<!DOCTYPE html>
<html>
<head>
<title></title>
<style>
body {
  text-align: center;
  font-family: Arial;
  background: #f0f0f0;
}
button {
  padding: 10px;
  margin: 5px;
}
</style>
</head>
<body>
<h2>ЖРТ Математика Тест</h2>
<div id="start">
<button onclick="startTest()">Баштоо</button>
</div>

<div id="quiz" style="display:none;">
<p id="question"></p>
<button onclick="checkAnswer(0)"></button>
<button onclick="checkAnswer(1)"></button>
<button onclick="checkAnswer(2)"></button>
</div>

<div id="result" style="display:none;">
<p id="score"></p>
<button onclick="restart()">Кайра баштоо</button>
</div>

<script>
var questions = [
  ["2 + 3 = ?", ["4","5","6"], 1],
  ["7 - 4 = ?", ["2","3","4"], 1],
  ["5 * 2 = ?", ["10","12","8"], 0],
  ["12 / 4 = ?", ["2","3","4"], 1],
  ["9 + 6 = ?", ["14","15","16"], 1],
  ["8 - 3 = ?", ["4","5","6"], 1],
  ["3 * 3 = ?", ["6","9","12"], 1],
  ["16 / 2 = ?", ["6","8","10"], 1],
  ["7 + 5 = ?", ["11","12","13"], 1],
  ["10 - 7 = ?", ["2","3","4"], 1]
];

var current = 0;
var score = 0;

function startTest(){
  document.getElementById("start").style.display = "none";
  document.getElementById("quiz").style.display = "block";
  showQuestion();
}

function showQuestion(){
  document.getElementById("question").innerHTML = questions[current][0];
  var answers = questions[current][1];
  var buttons = document.getElementsByTagName("button");
  buttons[1].innerHTML = answers[0];
  buttons[2].innerHTML = answers[1];
  buttons[3].innerHTML = answers[2];
}

function checkAnswer(i){
  if(i == questions[current][2]){
    score = score + 1;
  }
  current = current + 1;
  if(current < questions.length){
    showQuestion();
  } else {
    finishTest();
  }
}

function finishTest(){
  document.getElementById("quiz").style.display = "none";
  document.getElementById("result").style.display = "block";
  document.getElementById("score").innerHTML =
    "Жыйынтык: " + score + " / " + questions.length;
}

function restart(){
  current = 0;
  score = 0;
  document.getElementById("result").style.display = "none";
  document.getElementById("start").style.display = "block";
}
</script>

</body>
</html>
